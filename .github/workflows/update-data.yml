name: Update LKA Dashboard Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Fetch TikTok data via Playwright
        run: node update.js

      - name: Deploy to Surge
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          npm install -g surge
          surge . lka-dashboard.surge.sh

      - name: Commit and push
        run: |
          git config user.name "LKA Dashboard Bot"
          git config user.email "bot@lka-factory.com"
          git add clients/*/data.json
          git diff --staged --quiet || git commit -m "data: update all clients $(date -u +%Y-%m-%d_%H:%M)"
          git push
